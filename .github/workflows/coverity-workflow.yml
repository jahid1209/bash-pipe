# Quickstart: Black Duck Security Scan Action with coverity:
#     https://blackduck-dev.zoominsoftware.io/bundle/bridge/page/documentation/t_github-coverity-quickstart.html
name: Coverity Scan
on:
  push:
    branches:
      - main
      - master
      - develop
      - stage
      - release
  pull_request:
    branches:
      - main
      - master
      - develop
      - stage
      - release
  workflow_dispatch: {}
jobs:
  coverity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Coverity Scan
        id: coverity-scan
        uses: blackduck-inc/black-duck-security-scan@v2
        with:
          ### SCANNING: Required fields
          coverity_url: ${{ vars.COVERITY_URL }}
          coverity_user: ${{ secrets.COVERITY_USER }}
          coverity_passphrase: ${{ secrets.COVERITY_PASSPHRASE }}
          ### LOCAL ANALYSIS
          coverity_local: true  # Enable local analysis mode


          ### SCAN CONFIGURATION: Uncomment below to enable
          # coverity_waitForScan: true # Wait for scan completion before proceeding

          ### Mark build status if policy violating issues are found
          # mark_build_status: failure # Set to success, failure, or skip

          ### Uncomment below configuration if Bridge diagnostic files needs to be uploaded
          # include_diagnostics: false

          ### GITHUB TOKEN: Uncomment below to enable
          # github_token: ${{ secrets.GITHUB_TOKEN }} # Required when PR comments or sarif reports enabled

          ### SCANNING: Optional fields
          # coverity_prComment_enabled: false